<div class="contact">
    <div class="contact-layout">
        
        <div class="contact-image">
            <img src="images/ContactPhoto.jpg" alt="Contact Photo">
        </div>
 
        <div class="contact-right">
            <h1>Contact <em>Me</em></h1>
 
            <div class="contact-box">
                <form target="_blank" action="https://formsubmit.co/timdoan.jpg@gmail.com" method="POST" class="contact-fields">
                    <div class="field">
                        <label>Full Name</label>
                        <input type="text" name="name" required>
                    </div>
                    <div class="field">
                        <label>E-mail</label>
                        <input type="email" name="email" required>
                    </div>
                    <div class="field">
                        <label>Message</label>
                        <input type="text" name="message" required>
                    </div>
                    <button type="submit" class="button">Submit Form <span class="arrow">→</span></button>
                </form>
 
                <aside class="contact-info">
                    <div class="info-block">
                        <h3>Contact</h3>
                        <p>timdoan.jpg<br>@gmail.com</p>
                    </div>
                    <div class="info-block">
                        <h3>Based in</h3>
                        <p>Santa Cruz,<br>California</p>
                    </div>
                </aside>
            </div>
        </div>
 
    </div>
 
</div>
